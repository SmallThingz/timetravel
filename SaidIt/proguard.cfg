-repackageclasses ''
-flattenpackagehierarchy ''

-overloadaggressively
-dontobfuscate
-allowaccessmodification
-mergeinterfacesaggressively
-optimizationpasses 7
-keepattributes SourceFile,LineNumberTable
-keepattributes SourceDebugExtension

-maximumremovedandroidloglevel 6

-assumenosideeffects class android.util.Log {
    public static *** v(...);
    public static *** d(...);
    public static *** i(...);
    public static *** w(...);
    public static *** e(...);
    public static *** wtf(...);
    public static boolean isLoggable(...);
}

-assumenosideeffects class kotlin.jvm.internal.Intrinsics {
    public static void checkNotNull(...);
    public static void checkExpressionValueIsNotNull(...);
    public static void checkNotNullParameter(...);
    public static void checkParameterIsNotNull(...);
    public static void checkReturnedValueIsNotNull(...);
    public static void checkFieldIsNotNull(...);
}

-assumenosideeffects class java.lang.StringBuilder {
    public java.lang.StringBuilder append(java.lang.String);
}
-assumenosideeffects class java.lang.StringBuffer {
    public java.lang.StringBuffer append(java.lang.String);
}

-keepclassmembers enum * {
    public static **[] values();
    public static ** valueOf(java.lang.String);
}

-assumenosideeffects class kotlin.reflect.jvm.internal.ReflectionFactoryImpl {
    public static *** getOrCreateKotlinClass(...);
    public static *** getOrCreateKotlinPackage(...);
    public static *** getOrCreateKotlinClasses(...);
}
